<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}合成计算器{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="navbar-brand">
            <a href="/" class="brand-link">
                <span class="brand-icon">⚙️</span>
                <span class="brand-text">合成计算器</span>
            </a>
        </div>
        <div class="navbar-game">
            {% if current_game %}
                <span class="game-label">当前配方:</span>
                <span class="game-name">{{ current_game }}</span>
            {% else %}
                <span class="game-name">未选择配方文件</span>
            {% endif %}
        </div>
        <button class="navbar-toggle" id="navbarToggle" aria-label="切换导航">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>

    <!-- 主体布局 -->
    <div class="main-layout">
        <!-- 侧边栏导航 -->
        <aside class="sidebar" id="sidebar">
            <nav class="sidebar-nav">
                <a href="/" class="nav-item {% if request.endpoint == 'index' %}active{% endif %}">
                    <span class="nav-icon">🏠</span>
                    <span class="nav-text">首页</span>
                </a>
                <a href="/select-game" class="nav-item {% if request.endpoint == 'select_game' %}active{% endif %}">
                    <span class="nav-icon">📁</span>
                    <span class="nav-text">选择配方</span>
                </a>
                <a href="/calculate" class="nav-item {% if request.endpoint == 'calculate_page' %}active{% endif %}">
                    <span class="nav-icon">🧮</span>
                    <span class="nav-text">计算生产链</span>
                </a>
                <a href="/recipe-management" class="nav-item {% if request.endpoint == 'recipe_management_page' %}active{% endif %}">
                    <span class="nav-icon">📝</span>
                    <span class="nav-text">配方管理</span>
                </a>
            </nav>
        </aside>

        <!-- 主内容区域 -->
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- 底部导航（移动端） -->
    <nav class="bottom-nav" id="bottomNav">
        <a href="/" class="bottom-nav-item {% if request.endpoint == 'index' %}active{% endif %}">
            <span class="bottom-nav-icon">🏠</span>
            <span class="bottom-nav-text">首页</span>
        </a>
        <a href="/select-game" class="bottom-nav-item {% if request.endpoint == 'select_game' %}active{% endif %}">
            <span class="bottom-nav-icon">📁</span>
            <span class="bottom-nav-text">选择配方</span>
        </a>
        <a href="/calculate" class="bottom-nav-item {% if request.endpoint == 'calculate_page' %}active{% endif %}">
            <span class="bottom-nav-icon">🧮</span>
            <span class="bottom-nav-text">计算</span>
        </a>
        <a href="/recipe-management" class="bottom-nav-item {% if request.endpoint == 'recipe_management_page' %}active{% endif %}">
            <span class="bottom-nav-icon">📝</span>
            <span class="bottom-nav-text">管理</span>
        </a>
    </nav>

    <!-- Toast通知容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 加载遮罩 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <span class="loading-text">加载中...</span>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
